id: fhirems.emscore
canonical: https://fhirems.github.io/fhirEMSCoreIG
name: FhirEMSCore
# IMPORTANT: This is an unofficial AI-generated research project.
# It is NOT an HL7 product and has NOT been approved by any standards body.
# The canonical URL is the project's GitHub Pages namespace (not an HL7 namespace).
title: "FHIR EMS Core Implementation Guide (Unofficial Research Project)"
description: >
  UNOFFICIAL AI-GENERATED RESEARCH PROJECT — NOT FOR CLINICAL USE.
  A FHIR R4 Implementation Guide for Emergency Medical Services (EMS) based on
  NEMSIS Version 3.5.1.251001CP2, aligned with US Core 6.1.0 and FHIR R4 base
  resources. This IG was generated by Claude (Anthropic) for public research and
  educational purposes. It is not endorsed by HL7, NEMSIS TAC, NHTSA, CMS, or any
  other standards body. The canonical URL is the project's GitHub Pages namespace
  and does not represent a registered HL7 namespace.
status: draft
version: 0.2.0
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: ci-build

# IG Publisher metadata
# NOTE: This publisher is fictitious. This IG was not produced by HL7.
publisher:
  name: fhirEMSCore Research Project (AI-Generated — Unofficial)
  url: https://github.com/fhirEMS/fhirEMSCoreIG

# Contact information
contact:
  - name: fhirEMSCore Research Project
    telecom:
      - system: url
        value: https://github.com/fhirEMS/fhirEMSCoreIG

# License
license: CC0-1.0

# Dependencies
dependencies:
  hl7.fhir.us.core:
    version: 6.1.0
    uri: http://hl7.org/fhir/us/core/ImplementationGuide/hl7.fhir.us.core
  hl7.terminology.r4:
    version: 5.5.0
    uri: http://terminology.hl7.org/ImplementationGuide/hl7.terminology
  hl7.fhir.uv.extensions.r4:
    version: 1.0.0
    uri: http://hl7.org/fhir/extensions/ImplementationGuide/hl7.fhir.uv.extensions
  hl7.fhir.uv.tools.r4:
    version: 1.1.2
    uri: http://hl7.org/fhir/tools/ImplementationGuide/hl7.fhir.uv.tools

# Pages configuration
pages:
  index.md:
    title: Home
  background.md:
    title: Background
  guidance.md:
    title: Implementation Guidance
  security.md:
    title: Security and Privacy
  nemsis-overview.md:
    title: NEMSIS Overview
  uscore-alignment.md:
    title: US Core Alignment
  profiles.md:
    title: Profiles Overview
  extensions.md:
    title: Extensions
  terminology.md:
    title: Terminology
  mapping.md:
    title: NEMSIS-to-FHIR Mapping
  differential.md:
    title: NEMSIS vs US Core Differential
  must-support.md:
    title: Must Support Requirements
  examples.md:
    title: Examples
  downloads.md:
    title: Downloads
  changes.md:
    title: Change Log
  ip-statements.md:
    title: IP Statements and License

# Parameters
parameters:
  path-resource:
    - input/resources
    - fsh-generated/resources
  path-pages:
    - input/pagecontent
    - fsh-generated/includes
  path-expansion-params: '../../input/terminology-settings.json'
  active-tables: false
  apply-version: true
  apply-copyright: true
  apply-publisher: true
  apply-jurisdiction: true
  apply-license: true
  apply-contact: true
  show-inherited-invariants: false
  pin-canonicals: pin-multiples
  usage-stats-opt-out: true
  excludexml: false
  excludejson: false
  excludettl: false
  excludemap: false
  propagate-status: true
  generate:
    - xml
    - json

# Jurisdiction
jurisdiction: urn:iso:std:iso:3166#US "United States of America"

# Groups for organizing IG artifacts
groups:
  PatientCareReport:
    name: "Patient Care Report (PCR) Profiles"
    description: "Core profiles representing an EMS Patient Care Report"
    resources:
      - StructureDefinition/ems-composition
      - StructureDefinition/ems-patient
      - StructureDefinition/ems-encounter

  ResponseResources:
    name: "EMS Response Resources"
    description: "Profiles supporting EMS dispatch, response, and scene data"
    resources:
      - StructureDefinition/ems-location-scene
      - StructureDefinition/ems-location-destination
      - StructureDefinition/ems-location-agency
      - StructureDefinition/ems-condition

  ClinicalResources:
    name: "Clinical Assessment Profiles"
    description: "Profiles for vitals, procedures, medications, and clinical findings"
    resources:
      - StructureDefinition/ems-observation-vitalsigns
      - StructureDefinition/ems-observation-bp
      - StructureDefinition/ems-observation-gcs
      - StructureDefinition/ems-observation-exam
      - StructureDefinition/ems-observation-airway
      - StructureDefinition/ems-observation-labs
      - StructureDefinition/ems-observation-outcome
      - StructureDefinition/ems-condition-arrest
      - StructureDefinition/ems-condition-injury
      - StructureDefinition/ems-condition-problems
      - StructureDefinition/ems-procedure
      - StructureDefinition/ems-medicationadministration
      - StructureDefinition/ems-medicationstatement
      - StructureDefinition/ems-allergyintolerance

  AgencyResources:
    name: "EMS Agency and Crew Profiles"
    description: "Profiles for EMS agency demographics and crew members"
    resources:
      - StructureDefinition/ems-organization
      - StructureDefinition/ems-practitioner
      - StructureDefinition/ems-practitionerrole
      - StructureDefinition/ems-device-vehicle

  DocumentationResources:
    name: "Documentation and Custom Element Profiles"
    description: "Profiles for PCR attachments, signatures, and agency custom elements (eOther, eCustom)"
    resources:
      - StructureDefinition/ems-documentreference
      - StructureDefinition/ems-provenance
      - StructureDefinition/ems-questionnaire
      - StructureDefinition/ems-questionnaireresponse

  PaymentResources:
    name: "EMS Payment and Billing Profiles"
    description: "Profiles for EMS billing, insurance, and CMS claims (ePayment section)"
    resources:
      - StructureDefinition/ems-coverage
      - StructureDefinition/ems-claim

  Extensions:
    name: "NEMSIS Extensions"
    description: "Extensions required to represent NEMSIS-specific data elements"

  ValueSets:
    name: "Value Sets"
    description: "Value sets bound to NEMSIS coded elements"

  CodeSystems:
    name: "Code Systems"
    description: "NEMSIS-defined code systems"
